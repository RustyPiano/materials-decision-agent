# 数据清单 / Data Manifest  —  M0 固定记录
# 对应 Spec §3.1（开发前必须固定的项）。本文件一旦确认即视为版本化锁定。

source:
  repo: csuhwq0421/ML4Dendrites
  url: https://github.com/csuhwq0421/ML4Dendrites
  commit_sha: f677ae463af9271acea0d5c0cf595f7d3560baab   # main HEAD @ 2026-06-24
  paper: >-
    Machine intelligence supports the full chain of material synthesis:
    A case study on chemical vapor deposition growth of 2D ReSe2 dendrites
  local_vendor_path: vendor/ML4Dendrites

license:
  status: CONFLICT_NEEDS_RESOLUTION       # ⚠ 须与作者/同组确认
  license_file: Apache-2.0                 # 仓库内 LICENSE 文件实际内容
  readme_states: MIT                       # README 文末声明
